name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # Uses the pnpm version pinned by package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
        env:
          # Channel discovery constructs the verifier during build; this value
          # is CI-only and is never a production webhook credential.
          GITHUB_WEBHOOK_SECRET: ci-build-only-secret
          # Public URL baked into the web build; overridden per deployment.
          # CI-only placeholder so `next build` passes env validation.
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
