name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version or publish package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
        env:
          GITHUB_WEBHOOK_SECRET: ci-build-only-secret
          # Public URL baked into the web build; overridden per deployment.
          # CI-only placeholder so `next build` passes env validation.
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

      - name: Open release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          title: "Release packages"
          commit: "chore: release packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WEBHOOK_SECRET: ci-build-only-secret
